<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YP AniTracker (Cloud Pro)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #0d0f18; --card-bg: #16192b; --accent-purple: #8a2be2; --accent-neon: #00f5d4; --accent-green: #2ecc71; --accent-blue: #3a86ff; --accent-orange: #ff0055; --text-color: #f1f3f9; --text-muted: #7e8da6; --danger: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; overflow-x: hidden; }
        #global-loader { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-color); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .layout-section { display: none; opacity: 0; transition: opacity 0.5s; }
        .active-layout { display: block; opacity: 1; }
        
        /* Karten & Glow */
        @keyframes relaxGlow { 0% { box-shadow: 0 4px 10px rgba(0,0,0,0.3), 0 0 5px rgba(138, 43, 226, 0.1); } 50% { box-shadow: 0 4px 10px rgba(0,0,0,0.3), 0 0 15px rgba(138, 43, 226, 0.3); } 100% { box-shadow: 0 4px 10px rgba(0,0,0,0.3), 0 0 5px rgba(138, 43, 226, 0.1); } }
        .anime-item, .anime-grid-item { animation: relaxGlow 4s infinite alternate; border-radius: 12px; background: var(--card-bg); padding: 15px; margin-bottom: 10px; cursor: pointer; }
        
        /* Stats Badge */
        .stat-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
        .stat-box { background: #111320; padding: 10px 25px; border-radius: 12px; border: 1px solid var(--accent-green); box-shadow: 0 0 10px rgba(46, 204, 113, 0.2); text-align: center; }
        .stat-number { font-size: 1.5rem; font-weight: 700; color: var(--accent-green); }
        
        /* Responsive Grids */
        .grid-layout-watchlist, .grid-layout-next { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        /* Modals */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card-bg); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; }
        .detail-cover { width: 100%; height: auto; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="global-loader"><i class="fa-solid fa-spinner fa-spin" style="font-size:3rem; color:var(--accent-neon);"></i></div>
    
    <div id="auth-layout" class="layout-section">
        <div id="auth-content" class="auth-container"></div>
    </div>

    <div id="app-layout" class="layout-section">
        <header>
            <div class="logo" onclick="showPage('home')"><span>YP AniTracker</span></div>
            <button class="btn-icon" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i></button>
        </header>
        <div class="container" id="main-container"></div>
    </div>

    <script>
        const db = window.supabase.createClient("https://anyvdbweojvaztyiacwb.supabase.co", "sb_publishable_6A73CDl65UrCWWVbTz9z7A_nu3cIWME");
        
        // Login wird erst jetzt ins DOM geladen, iPhone ignoriert das Passwortfeld im Hintergrund
        function renderLogin() {
            document.getElementById('auth-content').innerHTML = `
                <form onsubmit="event.preventDefault(); handleLogin();">
                    <div class="auth-form-group">
                        <label>E-Mail</label>
                        <input type="email" id="login-email" autocomplete="email">
                    </div>
                    <div class="auth-form-group">
                        <label>Passwort</label>
                        <input type="password" id="login-password" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-auth">Login</button>
                </form>
            `;
        }

        db.auth.getSession().then(({ data: { session } }) => {
            document.getElementById('global-loader').style.display = 'none';
            if (session) {
                document.getElementById('app-layout').classList.add('active-layout', 'visible');
            } else {
                document.getElementById('auth-layout').classList.add('active-layout', 'visible');
                renderLogin();
            }
        });

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await db.auth.signInWithPassword({ email, password });
            if (!error) location.reload();
            else alert(error.message);
        }

        async function handleLogout() {
            await db.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
