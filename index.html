<script>
        // === NATIVER DATENBANK-ZUGRIFF ===
        const API_URL = "https://anyvdbweojvaztyiacwb.supabase.co/rest/v1/animes";
        const API_KEY = "sb_publishable_6A73CDl65UrCWWVbTz9z7A_nu3cIWME";
        
        const reqHeaders = {
            'apikey': API_KEY,
            'Authorization': 'Bearer ' + API_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
        };

        let animeData = { watched: [], nextSeason: [], watchlist: [], current: [] };

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        function openModal(pageContext) {
            document.getElementById('modal-page-context').value = pageContext;
            document.getElementById('anime-title').value = '';
            document.getElementById('anime-meta-input').value = '';
            document.getElementById('anime-is-released').checked = false;

            if(pageContext === 'next-season') {
                document.getElementById('modal-title').innerText = 'Anime mit Folgestaffel eintragen';
                document.getElementById('meta-field-group').style.display = 'block';
                document.getElementById('released-field-group').style.display = 'flex';
            } else {
                document.getElementById('modal-title').innerText = 'Neuen Anime hinzufügen';
                document.getElementById('meta-field-group').style.display = 'none';
                document.getElementById('released-field-group').style.display = 'none';
            }
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function showLoadingStates() {
            const loading = '<div class="loading-notice"><i class="fa-solid fa-spinner fa-spin"></i> Verbinde mit Cloud...</div>';
            ['list-watched-completed', 'list-watched-continuing', 'list-next-waiting', 'list-next-released', 'list-watchlist', 'list-current'].forEach(id => {
                document.getElementById(id).innerHTML = loading;
            });
        }

        async function loadDataFromCloud() {
            showLoadingStates();
            try {
                const response = await fetch(API_URL + "?select=*&order=created_at.asc", {
                    method: 'GET',
                    headers: reqHeaders
                });
                if (!response.ok) throw new Error("HTTP Status " + response.status);
                
                const data = await response.json();
                animeData = { watched: [], nextSeason: [], watchlist: [], current: [] };

                data.forEach(item => {
                    const formatted = { id: item.id, title: item.title, meta: item.meta, isReleased: item.is_released };
                    
                    // --- BUGFIX: Name aus der Cloud an den lokalen Namen anpassen ---
                    let categoryKey = item.category;
                    if (categoryKey === 'next-season') {
                        categoryKey = 'nextSeason';
                    }
                    
                    if(animeData[categoryKey]) {
                        animeData[categoryKey].push(formatted);
                    }
                });
                renderAll();
            } catch (err) {
                console.error("Fetch Fehler:", err);
                alert("Datenbank nicht erreichbar. Bitte lade die Seite neu.");
            }
        }

        async function saveAnime() {
            const title = document.getElementById('anime-title').value.trim();
            const context = document.getElementById('modal-page-context').value;
            if(!title) return alert('Bitte gib einen Namen ein!');

            const payload = {
                title: title,
                category: context,
                meta: context === 'next-season' ? (document.getElementById('anime-meta-input').value.trim() || 'Keine Info') : 'Keine Info',
                is_released: context === 'next-season' ? document.getElementById('anime-is-released').checked : false
            };

            try {
                const res = await fetch(API_URL, { method: 'POST', headers: reqHeaders, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error("Speichern fehlgeschlagen");
                closeModal();
                await loadDataFromCloud();
            } catch(e) { alert(e.message); }
        }

        async function deleteAnime(context, id, elementId) {
            const element = document.getElementById(elementId);
            if(element) {
                element.classList.add('deleting');
                setTimeout(async () => {
                    try {
                        await fetch(API_URL + "?id=eq." + id, { method: 'DELETE', headers: reqHeaders });
                        await loadDataFromCloud();
                    } catch(e) { alert("Fehler beim Löschen"); }
                }, 250);
            }
        }

        async function toggleRelease(id, currentStatus) {
            try {
                await fetch(API_URL + "?id=eq." + id, {
                    method: 'PATCH',
                    headers: reqHeaders,
                    body: JSON.stringify({ is_released: !currentStatus })
                });
                await loadDataFromCloud();
            } catch(e) { alert("Status Update fehlgeschlagen"); }
        }

        // --- DYNAMISCHER HTML-GENERATOR ---
        function createAnimeDOM(anime, context, listName, index = null) {
            const uniqueId = `anime-${context}-${anime.id}-${listName}`;
            let metaHTML = '', actionHTML = '', leadingIconHTML = '';

            let borderClass = '';
            if (context === 'watched') borderClass = 'item-watched';
            else if (context === 'next-season') borderClass = anime.isReleased ? 'item-released' : 'item-waiting';
            else if (context === 'watchlist') borderClass = 'item-watchlist';
            else if (context === 'current') borderClass = 'item-current';

            if (index !== null) {
                let numClass = 'num-watched';
                if (context === 'next-season') numClass = anime.isReleased ? 'num-released' : 'num-waiting';
                leadingIconHTML = `<div class="anime-number ${numClass}">${index}</div>`;
            } else {
                let iconClass = 'fa-solid fa-bookmark';
                let decorColorClass = '';
                
                if (context === 'watched') { decorColorClass = 'color-watched'; }
                else if (context === 'next-season') { 
                    iconClass = anime.isReleased ? 'fa-solid fa-circle-exclamation' : 'fa-solid fa-hourglass-half';
                    decorColorClass = anime.isReleased ? 'color-released' : 'color-waiting';
                }
                else if (context === 'watchlist') { decorColorClass = 'color-watchlist'; }
                else if (context === 'current') { iconClass = 'fa-solid fa-circle-play'; decorColorClass = 'color-current'; }
                
                leadingIconHTML = `<i class="${iconClass} anime-decor-icon ${decorColorClass}"></i>`;
            }

            if(context === 'next-season') {
                metaHTML = `<div class="anime-meta"><i class="fa-regular fa-calendar"></i> <span>Next: ${anime.meta}</span></div>`;
                actionHTML = `
                    <button class="btn-action check" onclick="toggleRelease(${anime.id}, ${anime.isReleased})">
                        <i class="fa-solid ${anime.isReleased ? 'fa-circle-check' : 'fa-circle'}"></i>
                    </button>`;
            }

            return `
                <div class="anime-item ${borderClass}" id="${uniqueId}">
                    <div class="anime-info-wrapper">
                        ${leadingIconHTML}
                        <div class="anime-info"><h4>${anime.title}</h4>${metaHTML}</div>
                    </div>
                    <div class="action-btns">
                        ${actionHTML}
                        <button class="btn-action delete" onclick="deleteAnime('${context}', ${anime.id}, '${uniqueId}')">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>`;
        }

        function renderAll() {
            let globalWatchCounter = 0;
            
            document.getElementById('list-watched-completed').innerHTML = animeData.watched.length 
                ? animeData.watched.map(a => { globalWatchCounter++; return createAnimeDOM(a, 'watched', 'p-watch-comp', globalWatchCounter); }).join('') 
                : '<div class="empty-state">Noch keine komplett geschauten Animes eingetragen.</div>';
                
            document.getElementById('list-watched-continuing').innerHTML = animeData.nextSeason.length
                ? animeData.nextSeason.map(a => { globalWatchCounter++; return createAnimeDOM(a, 'next-season', 'p-watch-cont', globalWatchCounter); }).join('')
                : '<div class="empty-state">Keine offenen Serien mit neuen Staffeln.</div>';

            const waitingAnimes = animeData.nextSeason.filter(a => !a.isReleased);
            const releasedAnimes = animeData.nextSeason.filter(a => a.isReleased);

            document.getElementById('list-next-waiting').innerHTML = waitingAnimes.length ? waitingAnimes.map(a => createAnimeDOM(a, 'next-season', 'p-wait')).join('') : '<div class="empty-state">Keine offenen Wartepositionen.</div>';
            document.getElementById('list-next-released').innerHTML = releasedAnimes.length ? releasedAnimes.map(a => createAnimeDOM(a, 'next-season', 'p-rel')).join('') : '<div class="empty-state">Aktuell keine neuen Staffeln verfügbar.</div>';
            
            document.getElementById('list-watchlist').innerHTML = animeData.watchlist.length ? animeData.watchlist.map(a => createAnimeDOM(a, 'watchlist', 'p-wlist')).join('') : '<div class="empty-state">Deine Watchlist ist im Moment leer.</div>';
            document.getElementById('list-current').innerHTML = animeData.current.length ? animeData.current.map(a => createAnimeDOM(a, 'current', 'p-curr')).join('') : '<div class="empty-state">Du schaust momentan nichts aktiv.</div>';

            document.getElementById('hp-current-list').innerHTML = animeData.current.length ? animeData.current.map(a => `
                <div class="anime-item item-current">
                    <div class="anime-info-wrapper">
                        <i class="fa-solid fa-circle-play anime-decor-icon color-current"></i>
                        <div class="anime-info"><h4>${a.title}</h4></div>
                    </div>
                    <span class="status-badge current-badge">Folge läuft...</span>
                </div>
            `).join('') : '<div class="empty-state" style="padding: 12px; border: none;">Klicke oben auf "Currently Watching", um eine Serie hinzuzufügen!</div>';

            document.getElementById('hp-alerts-list').innerHTML = releasedAnimes.length ? releasedAnimes.map(a => `
                <div class="anime-item item-released">
                    <div class="anime-info-wrapper">
                        <i class="fa-solid fa-circle-exclamation anime-decor-icon color-released"></i>
                        <div class="anime-info"><h4>${a.title}</h4><div class="anime-meta"><span>${a.meta}</span></div></div>
                    </div>
                    <span class="status-badge alert">STAFFEL START!</span>
                </div>
            `).join('') : '<div class="empty-state" style="padding: 12px; border: none;">Alles auf dem neuesten Stand. Keine neuen Staffeln aktiv.</div>';
        }

        document.addEventListener('DOMContentLoaded', loadDataFromCloud);
    </script>
