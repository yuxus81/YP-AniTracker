<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YP AniTracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #0d0f18;
            --card-bg: #16192b;
            --accent-purple: #8a2be2;
            --accent-neon: #00f5d4;
            --text-color: #f1f3f9;
        }

        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; min-height: 100vh; }
        
        /* Layouts - nicht mehr absolute positioniert! */
        #auth-layout { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #app-layout { display: none; padding-bottom: 60px; }

        /* Auth Container */
        .auth-container { background: var(--card-bg); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid var(--accent-purple); text-align: center; }
        .auth-form-group { margin-bottom: 15px; text-align: left; }
        .auth-form-group input { width: 100%; padding: 12px; background: #0d0f18; border: 1px solid #333; border-radius: 8px; color: white; }
        .btn-auth { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--accent-purple); color: white; cursor: pointer; margin-top: 10px; }

        /* Header */
        header { background: #16192b; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo span { font-weight: 700; font-size: 1.5rem; background: linear-gradient(to right, var(--accent-neon), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .header-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .header-greeting { font-size: 0.8rem; color: var(--text-muted); }
        .header-buttons { display: flex; gap: 10px; }
        .btn-icon { background: none; border: 1px solid #333; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* Pages */
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .page { display: none; } .page.active { display: block; }
        
        /* Anime Item */
        .anime-item { background: var(--card-bg); padding: 15px; border-radius: 10px; display: flex; align-items: center; margin-bottom: 10px; border-left: 4px solid var(--accent-purple); }
        .anime-cover { width: 50px; height: 70px; object-fit: cover; border-radius: 4px; margin-right: 15px; }
        
        /* Utilities */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card-bg); padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
        
        @media (max-width: 600px) {
            .header-greeting { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div id="auth-layout">
        <div class="auth-container">
            <h2>Willkommen zurück</h2>
            <div class="auth-form-group">
                <label>E-Mail</label>
                <input type="email" id="login-email">
            </div>
            <div class="auth-form-group">
                <label>Passwort</label>
                <input type="password" id="login-password">
            </div>
            <button class="btn-auth" onclick="handleLogin()">Einloggen</button>
            <div class="auth-switch"><a onclick="toggleAuthMode('register')">Noch keinen Account?</a></div>
            <div id="auth-error-msg" style="color:red; margin-top:10px;"></div>
        </div>
    </div>

    <div id="app-layout">
        <header>
            <div class="logo" onclick="showPage('home')">
                <img src="icon-192.png" style="width: 30px;" onerror="this.style.display='none'">
                <span>AniTracker</span>
            </div>
            <div class="header-actions">
                <div class="header-buttons">
                    <button class="btn-icon" onclick="openSettingsModal()"><i class="fa-solid fa-gear"></i></button>
                    <button class="btn-icon" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
                <div class="header-greeting">Hey, <b id="header-username-display">User</b></div>
            </div>
        </header>

        <div class="container">
            <div id="page-home" class="page active">
                <button class="btn-auth" style="width: auto; padding: 10px 20px;" onclick="openModal('current')">+ Anime hinzufügen</button>
                <div id="list-current" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal">
            <h3>Anime hinzufügen</h3>
            <input type="hidden" id="modal-page-context">
            <input type="hidden" id="anime-cover-url">
            <input type="hidden" id="anime-mal-id">
            
            <div class="auth-form-group" style="position: relative;">
                <label>Name</label>
                <input type="text" id="anime-title" oninput="searchAnime(this.value)">
                <div id="search-results" style="position: absolute; width: 100%; background: #0d0f18; border: 1px solid #333; z-index: 10;"></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-auth" onclick="closeModal()">Abbrechen</button>
                <button class="btn-auth" style="background: var(--accent-green);" onclick="saveAnime()">Speichern</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://anyvdbweojvaztyiacwb.supabase.co";
        const API_KEY = "sb_publishable_6A73CDl65UrCWWVbTz9z7A_nu3cIWME";
        const db = window.supabase.createClient(SUPABASE_URL, API_KEY);

        // Auth Logic
        db.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                document.getElementById('auth-layout').style.display = 'none';
                document.getElementById('app-layout').style.display = 'block';
                document.getElementById('app-layout').classList.add('visible');
                document.getElementById('header-username-display').innerText = session.user.user_metadata.username || "User";
                loadDataFromCloud();
            } else {
                document.getElementById('auth-layout').style.display = 'flex';
                document.getElementById('auth-layout').classList.add('visible');
            }
        });

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await db.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('auth-error-msg').innerText = error.message;
            else location.reload();
        }

        async function handleLogout() {
            await db.auth.signOut();
            location.reload();
        }

        // Suche & Speichern
        async function searchAnime(query) {
            if(query.length < 3) return;
            const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=5`);
            const { data } = await res.json();
            document.getElementById('search-results').innerHTML = data.map(a => `
                <div style="padding: 10px; cursor: pointer; border-bottom: 1px solid #333;" onclick="selectAnime('${a.title.replace(/'/g, "\\'")}', '${a.images.jpg.image_url}', ${a.mal_id})">
                    ${a.title}
                </div>
            `).join('');
        }

        function selectAnime(t, c, m) {
            document.getElementById('anime-title').value = t;
            document.getElementById('anime-cover-url').value = c;
            document.getElementById('anime-mal-id').value = m;
            document.getElementById('search-results').innerHTML = '';
        }

        async function saveAnime() {
            const payload = {
                title: document.getElementById('anime-title').value,
                category: 'current',
                cover_url: document.getElementById('anime-cover-url').value,
                mal_id: parseInt(document.getElementById('anime-mal-id').value) || null
            };
            await db.from('animes').insert([payload]);
            closeModal();
            loadDataFromCloud();
        }

        async function loadDataFromCloud() {
            const { data } = await db.from('animes').select('*');
            document.getElementById('list-current').innerHTML = data.map(a => `
                <div class="anime-item">
                    ${a.cover_url ? `<img src="${a.cover_url}" class="anime-cover">` : ''}
                    <h4>${a.title}</h4>
                </div>
            `).join('');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function openModal(ctx) { document.getElementById('modal').classList.add('active'); }
        function showPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); }
        function openSettingsModal() { alert("Einstellungen Modul folgt."); }
    </script>
</body>
</html>
