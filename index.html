<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YP AniTracker (Cloud Pro) - Bento</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #0d0f18; --card-bg: #16192b; --accent-purple: #8a2be2; --accent-neon: #00f5d4; --accent-green: #2ecc71; --accent-blue: #3a86ff; --accent-orange: #ff0055; --text-color: #f1f3f9; --text-muted: #7e8da6; --danger: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        html, body { max-width: 100vw; overflow-x: hidden; overscroll-behavior-x: none; background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; margin: 0; }
        .pw-input { -webkit-text-security: disc; text-security: disc; }
        #global-loader { position: fixed; inset: 0; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        #global-loader h1 { margin-top: 15px; font-size: 1.8rem; background: linear-gradient(45deg, var(--accent-neon), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .layout-section { display: none; opacity: 0; transition: opacity 0.4s; }
        .active-layout { display: block !important; opacity: 1 !important; }
        #auth-layout { min-height: 100vh; align-items: center; justify-content: center; padding: 20px; } #auth-layout.active-layout { display: flex !important; } 
        #app-layout { padding-bottom: 80px; }
        .auth-container { background: var(--card-bg); border-radius: 20px; padding: 40px 30px; width: 100%; max-width: 400px; border: 1px solid rgba(138,43,226,0.25); box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; margin: auto; }
        .auth-logo img { width: 80px; border-radius: 20px; box-shadow: 0 0 20px rgba(138,43,226,0.5); } .auth-logo h1 { font-size: 1.8rem; margin: 15px 0 30px; background: linear-gradient(45deg, var(--accent-neon), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-form-group { margin-bottom: 20px; text-align: left; } .auth-form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        .auth-form-group input { width: 100%; padding: 14px; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .auth-form-group input:focus { border-color: var(--accent-purple); box-shadow: 0 0 10px rgba(138,43,226,0.2); }
        .auth-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; } .auth-options input { transform: scale(1.2); margin-right: 8px; accent-color: var(--accent-purple); }
        .btn-auth { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-login { background: linear-gradient(45deg, var(--accent-purple), #a04ef6); color: white; box-shadow: 0 4px 15px rgba(138,43,226,0.3); } .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(138,43,226,0.5); }
        .auth-switch { color: var(--text-muted); font-size: 0.9rem; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; } .auth-switch a { color: var(--accent-neon); font-weight: 600; cursor: pointer; }
        .auth-error { color: var(--accent-orange); font-size: 0.85rem; margin-top: 15px; min-height: 20px; font-weight: 600; }
        header { background: linear-gradient(135deg, #180f2b 0%, #0d0f18 100%); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-purple); }
        .logo { cursor: pointer; display: flex; align-items: center; gap: 12px; } .logo img { width: 45px; height: 45px; border-radius: 12px; } .logo span { font-size: 1.8rem; font-weight: 700; background: linear-gradient(45deg, var(--accent-neon), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; gap: 15px; align-items: center; } .header-buttons { display: flex; gap: 12px; } .header-greeting { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; } .header-greeting b { color: white; }
        .btn-icon-header { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
        .container { max-width: 950px; margin: 20px auto; padding: 0 20px; } .page { display: none; animation: fadeIn 0.3s forwards; } .page.active { display: block; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* --- BENTO BOX DASHBOARD --- */
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-rows: minmax(110px, auto); gap: 15px; margin-bottom: 30px; }
        .bento-card { background: var(--card-bg); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .bento-card:hover { transform: translateY(-4px); }
        .bento-watched { grid-column: span 1; grid-row: span 2; background: linear-gradient(135deg, rgba(46,204,113,0.1), transparent); border-color: rgba(46,204,113,0.3); }
        .bento-watched h3 { font-size: 2.5rem; color: var(--accent-green); line-height: 1; margin: 10px 0 5px; }
        .bento-watched i { color: var(--accent-green); font-size: 2rem; opacity: 0.8; }
        .bento-current { grid-column: span 1; grid-row: span 1; border-color: rgba(0,245,212,0.3); flex-direction: row; gap: 12px; justify-content: flex-start; }
        .bento-current i { color: var(--accent-neon); font-size: 1.5rem; }
        .bento-next { grid-column: span 1; grid-row: span 1; border-color: rgba(138,43,226,0.3); flex-direction: row; gap: 12px; justify-content: flex-start; }
        .bento-next i { color: var(--accent-purple); font-size: 1.5rem; }
        .bento-watchlist { grid-column: span 2; grid-row: span 1; border-color: rgba(58,134,255,0.3); flex-direction: row; gap: 12px; justify-content: center; background: linear-gradient(90deg, rgba(58,134,255,0.05), transparent); }
        .bento-watchlist i { color: var(--accent-blue); font-size: 1.5rem; }
        .bento-card span { font-weight: 600; font-size: 0.95rem; }
        
        /* --- LARGE TITLE PAGE HEADER OHNE ZURÜCK BUTTON --- */
        .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding: 10px 0 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .page-header h2 { margin: 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; text-align: left; }
        .btn-add { background: rgba(138,43,226,0.05); color: white; border: 1px solid rgba(138,43,226,0.5); padding: 10px 22px; border-radius: 30px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; box-shadow: 0 0 10px rgba(138,43,226,0.2); transition: 0.3s; }
        .btn-add:hover { background: rgba(138,43,226,0.2); box-shadow: 0 0 20px rgba(138,43,226,0.6); } .btn-add i { color: var(--accent-neon); }
        
        .dash-section-title, .sub-section-title { font-size: 1.15rem; margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .sub-section-title { font-size: 0.95rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* ALLGEMEINE LISTEN (EDGE TO EDGE) */
        .anime-item-list { display: flex; align-items: center; background: transparent; padding: 18px 10px; border-bottom: 1px solid rgba(var(--glow-rgb), 0.3); cursor: pointer; min-height: 85px; transition: 0.3s; }
        .anime-item-list:hover { transform: translateX(4px); background: rgba(var(--glow-rgb), 0.05); }
        .anime-info-wrapper { display: flex; align-items: center; gap: 15px; flex: 1; min-width: 0; }
        .anime-cover { width: 55px; height: 80px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
        .anime-info { display: flex; flex-direction: column; gap: 6px; overflow: hidden; flex: 1; } .anime-info h4 { font-size: 1.1rem; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-watched { --glow-rgb: 46,204,113; } .item-current { --glow-rgb: 0,245,212; } .item-waiting { --glow-rgb: 138,43,226; } .item-released { --glow-rgb: 255,0,85; }
        #hp-current-list .anime-item-list { background: rgba(0,245,212,0.05); border-radius: 12px; border: 1px solid rgba(0,245,212,0.2); margin-bottom: 10px; padding: 12px 15px; border-bottom-width: 1px; }
        
        /* NUMBER & ICONS */
        .anime-number { font-weight: 700; font-size: 1.1rem; min-width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .num-watched { color: var(--accent-green); background: rgba(46,204,113,0.1); } .num-waiting { color: var(--accent-purple); background: rgba(138,43,226,0.1); } .num-released { color: var(--accent-orange); background: rgba(255,0,85,0.1); }
        .anime-decor-icon { font-size: 1.1rem; flex-shrink: 0; } .color-current { color: var(--accent-neon); }

        /* GRID NEXT SEASON & WATCHLIST */
        .grid-layout-next, .grid-layout-watchlist { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .next-card, .watchlist-card { position: relative; border-radius: 12px; overflow: hidden; background: transparent; cursor: pointer; border: 1px solid rgba(58,134,255,0.2); display: flex; flex-direction: column; transition: 0.3s; }
        .next-card { background: var(--card-bg); border-color: transparent; }
        .next-card:hover, .watchlist-card:hover { transform: translateY(-4px); z-index: 10; }
        .nc-poster, .wl-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 12px; } .next-card .nc-poster { border-radius: 12px 12px 0 0; }
        .nc-info { padding: 12px; } .nc-info h4 { font-size: 0.95rem; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .next-card.item-waiting { border-color: rgba(138,43,226,0.3); } .next-card.item-released { border-color: rgba(255,0,85,0.5); box-shadow: 0 0 15px rgba(255,0,85,0.3); }
        .wl-overlay { position: absolute; bottom: 0; width: 100%; padding: 40px 10px 10px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); color: white; text-align: center; }
        .wl-overlay h4 { font-size: 0.95rem; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .release-poster-card { border-color: rgba(255,0,85,0.5); } .rp-badge { position: absolute; top: 6px; right: 6px; background: var(--accent-orange); color: white; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 6px; z-index: 5; }

        /* MODALS & POPUPS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,11,18,0.85); backdrop-filter: blur(6px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background: var(--card-bg); border-radius: 20px; padding: 25px; width: 92%; max-width: 450px; border: 1px solid rgba(138,43,226,0.25); transform: scale(0.9); transition: 0.3s; max-height: 95vh; display: flex; flex-direction: column; }
        .modal-overlay.active .modal { transform: scale(1); }
        .form-group { margin-bottom: 20px; text-align: left; } .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-muted); }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; }
        .search-res { position: absolute; top: 100%; width: 100%; background: #0d0f18; border: 1px solid var(--accent-purple); z-index: 2000; max-height: 200px; overflow-y: auto; display: none; }
        .search-item { padding: 10px; display: flex; gap: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); } .search-cover { width: 35px; height: 50px; object-fit: cover; }
        
        #detail-modal .modal { padding: 25px 15px 20px; }
        .detail-cover-wrapper { margin-bottom: 10px; display: flex; justify-content: center; }
        .detail-cover-wrapper img { max-height: 45vh; max-width: 100%; object-fit: contain; border-radius: 10px; }
        .detail-title { font-size: 1.3rem; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-align: center; }
        .btn-pop { flex: 1; min-width: 45%; padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; gap: 5px; border: 1px solid transparent; background: transparent; }
        .btn-pop-neon { background: rgba(0,245,212,0.1); color: var(--accent-neon); border-color: rgba(0,245,212,0.3); } .btn-pop-green { background: rgba(46,204,113,0.1); color: var(--accent-green); border-color: rgba(46,204,113,0.3); } .btn-pop-orange { background: rgba(255,0,85,0.1); color: var(--accent-orange); border-color: rgba(255,0,85,0.3); } .btn-pop-danger { background: rgba(255,71,87,0.1); color: var(--danger); border-color: rgba(255,71,87,0.3); }

        .toast { opacity: 0; position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%); background: linear-gradient(45deg, #a04ef6, var(--accent-purple)); color: white; padding: 12px 26px; border-radius: 30px; transition: 0.4s; z-index: 1000; }
        .toast.show { bottom: 30px; opacity: 1; }

        @media (max-width: 600px) {
            header { padding: 15px; } .logo span { font-size: 1.3rem; } .header-actions { flex-direction: column; gap: 4px; } .header-greeting { font-size: 0.75rem; }
            .page-header { flex-direction: row; align-items: center; border: none; padding: 10px 5px; }
            .page-header h2 { font-size: 2.1rem; }
            .page-header .btn-add { padding: 10px; border-radius: 50%; width: 45px; height: 45px; justify-content: center; } .page-header .btn-add span { display: none; }
            .grid-layout-next, .grid-layout-watchlist { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            #hp-alerts-grid .grid-layout-watchlist { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .bento-watched h3 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div id="global-loader"><i class="fa-solid fa-circle-notch fa-spin" style="color: var(--accent-neon); font-size: 3.5rem;"></i><h1>YP AniTracker</h1></div>
    <div id="auth-container-dynamic"></div><div id="settings-container-dynamic"></div>

    <div id="app-layout" class="layout-section">
        <header>
            <a class="logo" onclick="showPage('home')"><img src="icon-192.png" onerror="this.style.display='none'"><span>YP AniTracker</span></a>
            <div class="header-actions">
                <div class="header-buttons"><button class="btn-icon-header" onclick="openSettingsModal()"><i class="fa-solid fa-gear"></i></button><button class="btn-icon-header" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i></button></div>
                <div class="header-greeting">Hey, <b id="header-username-display">User</b></div>
            </div>
        </header>

        <div class="container">
            <div id="page-home" class="page active">
                <div class="bento-grid">
                    <div class="bento-card bento-watched" onclick="showPage('watched')">
                        <span>Geschaut</span>
                        <h3 id="bento-watched-count">0</h3>
                        <i class="fa-solid fa-square-check"></i>
                    </div>
                    <div class="bento-card bento-current" onclick="showPage('current')">
                        <i class="fa-solid fa-play"></i><span>Aktuell</span>
                    </div>
                    <div class="bento-card bento-next" onclick="showPage('next-season')">
                        <i class="fa-solid fa-calendar-plus"></i><span>Staffeln</span>
                    </div>
                    <div class="bento-card bento-watchlist" onclick="showPage('watchlist')">
                        <i class="fa-solid fa-hourglass-start"></i><span>Deine Watchlist öffnen</span>
                    </div>
                </div>

                <div class="dash-section-title"><i class="fa-solid fa-bolt" style="color: var(--accent-neon);"></i> Weiter am Schauen</div>
                <div id="hp-current-list" class="anime-list"></div>

                <div class="dash-section-title"><i class="fa-solid fa-fire" style="color: var(--accent-orange);"></i> Frische Releases!</div>
                <div id="hp-alerts-grid"></div>
            </div>

            <div id="page-watched" class="page">
                <div class="page-header"><h2>Geschaut</h2><button class="btn-add" onclick="openModal('watched')"><i class="fa-solid fa-plus"></i> <span>Hinzufügen</span></button></div>
                <div class="sub-section-title"><i class="fa-solid fa-check-double" style="color: var(--accent-green);"></i> Abgeschlossen</div><div id="list-watched-completed" class="anime-list"></div>
                <div class="sub-section-title"><i class="fa-solid fa-tv" style="color: var(--accent-purple);"></i> Fortsetzung folgt</div><div id="list-watched-continuing" class="anime-list"></div>
                <div class="sub-section-title"><i class="fa-solid fa-circle-exclamation" style="color: var(--accent-orange);"></i> Neue Staffel da!</div><div id="list-watched-released" class="anime-list"></div>
            </div>

            <div id="page-next-season" class="page">
                <div class="page-header"><h2>Staffeln</h2><button class="btn-add" onclick="openModal('next-season')"><i class="fa-solid fa-plus"></i> <span>Hinzufügen</span></button></div>
                <div class="sub-section-title"><i class="fa-solid fa-hourglass"></i> Zukünftige Staffeln</div><div id="list-next-waiting" class="grid-layout-next"></div> 
                <div class="sub-section-title"><i class="fa-solid fa-circle-exclamation" style="color: var(--accent-orange);"></i> Neue Releases!</div><div id="list-next-released" class="grid-layout-next"></div> 
            </div>

            <div id="page-watchlist" class="page">
                <div class="page-header"><h2>Watchlist</h2><button class="btn-add" onclick="openModal('watchlist')"><i class="fa-solid fa-plus"></i> <span>Hinzufügen</span></button></div>
                <div id="list-watchlist" class="grid-layout-watchlist"></div> 
            </div>

            <div id="page-current" class="page">
                <div class="page-header"><h2>Aktuell</h2><button class="btn-add" onclick="openModal('current')"><i class="fa-solid fa-plus"></i> <span>Hinzufügen</span></button></div>
                <div id="list-current" class="anime-list"></div>
            </div>
        </div>
    </div>

    <div id="detail-modal" class="modal-overlay" onclick="closeDetailModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="detail-cover-wrapper"><img id="detail-cover" src="" alt="Cover"></div>
            <div class="detail-content">
                <h3 id="detail-title" class="detail-title">Title</h3>
                <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 15px; gap: 8px;">
                    <span id="detail-format" style="font-weight: 700; text-transform: uppercase;"></span><span id="detail-format-dot" class="meta-dot" style="font-size: 1.2rem;">•</span><span id="detail-meta"></span>
                </div>
                <div id="detail-action-container" style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%;"></div>
            </div>
        </div>
    </div>
    <div id="toast-notification" class="toast"><i class="fa-solid fa-circle-check"></i> <span id="toast-message">Erfolgreich!</span></div>

    <script>
        if (typeof window.supabase === 'undefined') alert("Ladefehler: Supabase blockiert.");
        const db = window.supabase.createClient("https://anyvdbweojvaztyiacwb.supabase.co", "sb_publishable_6A73CDl65UrCWWVbTz9z7A_nu3cIWME");
        let animeData = { watched: [], nextSeason: [], watchlist: [], current: [] }; let toastTimeout; let isInitialLoad = true;

        /* SAFARI INJECTION */
        function injectAuthModals() {
            document.getElementById('auth-container-dynamic').innerHTML = `
                <div id="auth-layout" class="layout-section active-layout visible"><div class="auth-container" onkeydown="if(event.key === 'Enter') handleLogin();"><div class="auth-logo"><img src="icon-192.png"><h1>YP AniTracker</h1></div><div><div class="auth-form-group"><label>E-Mail</label><input type="text" id="login-email" autocomplete="off" data-lpignore="true"></div><div class="auth-form-group"><label>Passwort</label><input type="text" id="login-password" class="pw-input" autocomplete="off" data-lpignore="true"></div><button type="button" class="btn-auth btn-login" onclick="handleLogin()">Einloggen</button><div class="auth-switch"><a onclick="openForgotPasswordModal()">Passwort vergessen?</a><div>Neu hier? <a onclick="toggleAuthMode('register')">Account erstellen</a></div></div></div><div id="auth-error-msg" class="auth-error"></div></div></div>
                <div id="register-modal" class="modal-overlay"><div class="modal"><h3>Account erstellen</h3><div class="form-group"><label>Name</label><input type="text" id="reg-username"></div><div class="form-group"><label>E-Mail</label><input type="text" id="reg-email"></div><div class="form-group"><label>Passwort</label><input type="text" id="reg-password" class="pw-input"></div><button type="button" class="btn-auth btn-login" onclick="handleRegister()">Erstellen</button></div></div>
            `;
        }
        function openSettingsModal() { document.getElementById('settings-container-dynamic').innerHTML = `<div id="settings-modal" class="modal-overlay active"><div class="modal"><h3>Einstellungen</h3><button class="btn-auth" style="background:rgba(255,0,85,0.1); color:var(--danger);" onclick="wipeAccountData()">Account löschen</button><button type="button" class="btn-auth" onclick="closeSettingsModal()">Schließen</button></div></div>`; }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.remove('active'); setTimeout(() => document.getElementById('settings-container-dynamic').innerHTML='', 300); }

        db.auth.getSession().then(({ data: { session } }) => { document.getElementById('global-loader').style.display='none'; toggleLayout(session); });
        db.auth.onAuthStateChange((e, session) => { if(!isInitialLoad) toggleLayout(session); });

        function toggleLayout(session) {
            const appLayout = document.getElementById('app-layout');
            if (session) {
                document.getElementById('header-username-display').innerText = session.user.user_metadata.username || session.user.email.split('@')[0];
                document.getElementById('auth-container-dynamic').innerHTML = '';
                const addDiv = document.createElement('div'); addDiv.id = 'dynamic-add-modal-container';
                addDiv.innerHTML = `<div id="modal" class="modal-overlay"><div class="modal"><h3 id="modal-title">Anime hinzufügen</h3><input type="hidden" id="modal-page-context"><input type="hidden" id="anime-edit-id"><input type="hidden" id="anime-cover-url"><div class="form-group"><input type="text" id="anime-title" oninput="searchAnime(this.value)" placeholder="Suche..."><div id="search-results" class="search-res"></div></div><div id="type-field-group" class="form-group" style="display:none"><select id="anime-type" onchange="handleTypeChange()"><option value="staffel">Staffel</option><option value="film">Film</option></select></div><div id="meta-field-group" class="form-group" style="display:none"><input type="text" id="anime-meta-input"></div><div id="released-field-group" class="form-group checkbox-group" style="display:none"><input type="checkbox" id="anime-is-released"><label>Draußen!</label></div><div style="display:flex; gap:10px;"><button class="btn-pop" onclick="closeModal()">Abbruch</button><button class="btn-pop btn-pop-neon" onclick="saveAnime()">Speichern</button></div></div></div>`;
                if(!document.getElementById('dynamic-add-modal-container')) document.body.appendChild(addDiv);
                appLayout.classList.add('active-layout'); setTimeout(() => { appLayout.style.opacity='1'; loadDataFromCloud(); isInitialLoad=false; }, 50);
            } else { appLayout.style.opacity='0'; setTimeout(() => { appLayout.classList.remove('active-layout'); injectAuthModals(); isInitialLoad=false; }, 400); }
        }

        async function handleLogin() { const { error } = await db.auth.signInWithPassword({ email: login-email.value, password: login-password.value }); if(error) alert(error.message); else location.reload(); }
        async function handleLogout() { await db.auth.signOut(); location.reload(); }
        function showToast(msg) { const t = document.getElementById('toast-notification'); document.getElementById('toast-message').innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
        function showPage(pageId) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-' + pageId).classList.add('active'); window.scrollTo(0,0); }

        let searchTimeout;
        async function searchAnime(query) {
            clearTimeout(searchTimeout); const resDiv = document.getElementById('search-results');
            if(query.length < 3) return resDiv.style.display='none';
            searchTimeout = setTimeout(async () => {
                resDiv.style.display='block'; resDiv.innerHTML='Lade...';
                try {
                    const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=5`); const { data } = await res.json();
                    resDiv.innerHTML = data.map(a => `<div class="search-item" onclick="selectAnime('${a.title.replace(/'/g, "\\'")}', '${a.images.webp.large_image_url}', '${a.status}', '${a.type}', '${a.season||''}')"><img src="${a.images.webp.large_image_url}" class="search-cover"><span>${a.title}</span></div>`).join('');
                } catch(e) { resDiv.innerHTML='Fehler'; }
            }, 600);
        }
        function selectAnime(title, coverUrl, apiStatus, apiType, apiDate) {
            document.getElementById('anime-title').value = title; document.getElementById('anime-cover-url').value = coverUrl;
            document.getElementById('anime-type').value = apiType === 'Movie' ? 'film' : 'staffel';
            document.getElementById('anime-meta-input').value = apiStatus === 'Not yet aired' ? apiDate : '';
            document.getElementById('anime-is-released').checked = apiStatus === 'Currently Airing' || apiStatus === 'Finished Airing';
            handleTypeChange(); document.getElementById('search-results').style.display='none';
        }

        function handleTypeChange() {
            const ctx = document.getElementById('modal-page-context').value;
            if(ctx==='next-season' || ctx==='archive-pipeline') { document.getElementById('meta-field-group').style.display='block'; document.getElementById('released-field-group').style.display='flex'; }
        }

        function openModal(ctx) {
            document.getElementById('modal-page-context').value=ctx; document.getElementById('anime-edit-id').value=''; document.getElementById('anime-title').value=''; document.getElementById('search-results').style.display='none';
            document.getElementById('type-field-group').style.display = ctx==='next-season'?'block':'none'; document.getElementById('meta-field-group').style.display = ctx==='next-season'?'block':'none'; document.getElementById('released-field-group').style.display = ctx==='next-season'?'flex':'none';
            document.getElementById('modal').classList.add('active');
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function loadDataFromCloud() {
            const { data } = await db.from('animes').select('*').order('created_at');
            animeData = { watched: [], nextSeason: [], watchlist: [], current: [] };
            data.forEach(item => {
                let cleanMeta = item.meta || ''; let formatType = 'staffel';
                if (cleanMeta.startsWith('FILM|')) { formatType = 'film'; cleanMeta = cleanMeta.substring(5); } 
                else if (cleanMeta.startsWith('STAFFEL|')) { formatType = 'staffel'; cleanMeta = cleanMeta.substring(8); }
                const formatted = { id: item.id, title: item.title, meta: cleanMeta, isReleased: item.is_released, type: formatType, coverUrl: item.cover_url, category: item.category };
                let cat = item.category === 'next-season' ? 'nextSeason' : item.category;
                if(animeData[cat]) animeData[cat].push(formatted);
            });
            renderAll();
        }

        async function saveAnime() {
            const title = document.getElementById('anime-title').value; const ctx = document.getElementById('modal-page-context').value; const editId = document.getElementById('anime-edit-id').value;
            let targetCategory = ctx; let finalMeta = 'Keine Info'; let isRel = false;
            if (ctx === 'next-season') { finalMeta = (document.getElementById('anime-type').value === 'film' ? 'FILM|' : 'STAFFEL|') + document.getElementById('anime-meta-input').value; isRel = document.getElementById('anime-is-released').checked; }
            const payload = { title: title, category: targetCategory, meta: finalMeta, is_released: isRel, cover_url: document.getElementById('anime-cover-url').value };
            if (editId) await db.from('animes').update(payload).eq('id', editId); else await db.from('animes').insert([payload]);
            closeModal(); loadDataFromCloud(); showToast("Gespeichert!");
        }

        function openDetailModal(id) {
            const anime = [...animeData.watched, ...animeData.nextSeason, ...animeData.watchlist, ...animeData.current].find(a => a.id == id);
            document.getElementById('detail-cover').src = anime.coverUrl || ''; document.getElementById('detail-title').innerText = anime.title;
            const metaBadge = document.getElementById('detail-meta'); const formatBadge = document.getElementById('detail-format'); const formatDot = document.getElementById('detail-format-dot');
            if (anime.isReleased) { formatBadge.style.display='none'; formatDot.style.display='none'; metaBadge.innerText="🔥 DRAUßEN!"; metaBadge.style.color="var(--accent-orange)"; } 
            else { formatBadge.style.display='inline-block'; formatDot.style.display='inline-block'; formatBadge.innerText = anime.type; metaBadge.innerText = anime.meta || 'Archiv'; metaBadge.style.color="var(--text-muted)"; }
            
            let html = '';
            if(anime.category==='watchlist' || (anime.category==='next-season' && anime.isReleased)) html += `<button class="btn-pop btn-pop-neon" onclick="modalAction('${anime.id}', 'moveToCurrent')"><i class="fa-solid fa-play"></i> Schauen</button>`;
            if(anime.category==='current') html += `<button class="btn-pop btn-pop-green" onclick="modalAction('${anime.id}', 'finish')"><i class="fa-solid fa-check"></i> Fertig</button>`;
            html += `<button class="btn-pop btn-pop-danger" onclick="modalAction('${anime.id}', 'delete')"><i class="fa-solid fa-trash"></i> Löschen</button>`;
            document.getElementById('detail-action-container').innerHTML = html; document.getElementById('detail-modal').classList.add('active');
        }
        function closeDetailModal(e) { if(e) e.stopPropagation(); document.getElementById('detail-modal').classList.remove('active'); }
        async function modalAction(id, action) {
            closeDetailModal();
            if(action==='delete') await db.from('animes').delete().eq('id', id);
            if(action==='moveToCurrent') await db.from('animes').update({category:'current'}).eq('id', id);
            if(action==='finish') await db.from('animes').update({category:'watched'}).eq('id', id);
            loadDataFromCloud();
        }

        function createDOM(a, ctx) {
            if(ctx === 'watchlist') return `<div class="watchlist-card" onclick="openDetailModal('${a.id}')"><img src="${a.coverUrl}" class="wl-poster"><div class="wl-overlay"><h4>${a.title}</h4></div></div>`;
            if(ctx === 'next-season') return `<div class="next-card ${a.isReleased?'item-released':'item-waiting'}" onclick="openDetailModal('${a.id}')"><img src="${a.coverUrl}" class="nc-poster"><div class="nc-info"><h4>${a.title}</h4></div></div>`;
            return `<div class="anime-item-list ${ctx==='current'?'item-current':'item-watched'}" onclick="openDetailModal('${a.id}')"><div class="anime-info-wrapper"><img src="${a.coverUrl}" class="anime-cover"><div class="anime-info"><h4>${a.title}</h4></div></div></div>`;
        }

        function renderAll() {
            document.getElementById('bento-watched-count').innerText = animeData.watched.length;
            const released = animeData.nextSeason.filter(a => a.isReleased);
            document.getElementById('list-watched-completed').innerHTML = animeData.watched.map(a => createDOM(a, 'watched')).join('');
            document.getElementById('list-watchlist').innerHTML = animeData.watchlist.map(a => createDOM(a, 'watchlist')).join('');
            document.getElementById('list-current').innerHTML = animeData.current.map(a => createDOM(a, 'current')).join('');
            document.getElementById('hp-current-list').innerHTML = animeData.current.map(a => createDOM(a, 'current')).join('');
            document.getElementById('list-next-waiting').innerHTML = animeData.nextSeason.filter(a=>!a.isReleased).map(a => createDOM(a, 'next-season')).join('');
            document.getElementById('list-next-released').innerHTML = released.map(a => createDOM(a, 'next-season')).join('');
            if (released.length > 0) document.getElementById('hp-alerts-grid').innerHTML = `<div class="grid-layout-watchlist">${released.map(a => `<div class="release-poster-card" onclick="openDetailModal('${a.id}')"><div class="rp-badge">NEU</div><img src="${a.coverUrl}" class="wl-poster"><div class="wl-overlay"><h4>${a.title}</h4></div></div>`).join('')}</div>`;
        }
    </script>
</body>
</html>
