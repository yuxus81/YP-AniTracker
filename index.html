<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YP AniTracker (Cloud)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0f18">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #0d0f18;
            --card-bg: #16192b;
            --accent-purple: #8a2be2;
            --accent-neon: #00f5d4;
            --accent-green: #2ecc71;
            --accent-blue: #3a86ff;
            --accent-orange: #ff0055;
            --text-color: #f1f3f9;
            --text-muted: #7e8da6;
            --danger: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; overflow-x: hidden; }
        
        /* --- LAYOUT CONTROLLER (FIXED FÜR IOS AUTOFILL) --- */
        #auth-layout { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; opacity: 0; transition: opacity 0.5s ease; }
        #auth-layout.active-layout { display: flex; }
        #auth-layout.visible { opacity: 1; }
        
        #app-layout { display: none; padding-bottom: 60px; opacity: 0; transition: opacity 0.5s ease; }
        #app-layout.active-layout { display: block; }
        #app-layout.visible { opacity: 1; }

        /* --- AUTH SCREEN STYLING --- */
        .auth-container { background: var(--card-bg); border-radius: 20px; padding: 40px 30px; width: 100%; max-width: 400px; border: 1px solid rgba(138, 43, 226, 0.25); box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; }
        .auth-logo { margin-bottom: 30px; }
        .auth-logo img { width: 80px; border-radius: 20px; box-shadow: 0 0 20px rgba(138, 43, 226, 0.5); }
        .auth-logo h1 { font-size: 1.8rem; margin-top: 15px; background: linear-gradient(45deg, var(--accent-neon), #b55fe6, var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-form-group { margin-bottom: 20px; text-align: left; }
        .auth-form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        .auth-form-group input { width: 100%; padding: 14px; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .auth-form-group input:focus { border-color: var(--accent-purple); box-shadow: 0 0 10px rgba(138, 43, 226, 0.2); }
        
        .auth-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; }
        .auth-options input { accent-color: var(--accent-purple); transform: scale(1.2); margin-right: 8px; cursor: pointer; width: auto; }

        .btn-auth { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-login { background: linear-gradient(45deg, var(--accent-purple), #a04ef6); color: white; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3); }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(138, 43, 226, 0.5); }
        
        .auth-switch { color: var(--text-muted); font-size: 0.9rem; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .auth-switch a { color: var(--accent-neon); text-decoration: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .auth-switch a:hover { color: white; }
        .auth-error { color: var(--accent-orange); font-size: 0.85rem; margin-top: 15px; min-height: 20px; font-weight: 600; }

        /* --- APP HEADER --- */
        header {
            background: linear-gradient(135deg, #180f2b 0%, #0d0f18 100%); padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--accent-purple); box-shadow: 0 4px 25px rgba(138, 43, 226, 0.25);
            position: relative;
        }
        .logo { cursor: pointer; display: flex; align-items: center; gap: 12px; transition: transform 0.3s; text-decoration: none; }
        .logo:hover { transform: scale(1.05) rotate(-1deg); }
        .logo img { width: 45px; height: 45px; border-radius: 12px; box-shadow: 0 0 10px rgba(138, 43, 226, 0.5); object-fit: cover; flex-shrink: 0; display: block; }
        .logo span { font-size: 1.8rem; font-weight: 700; background: linear-gradient(45deg, var(--accent-neon), #b55fe6, var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
        
        .header-actions { display: flex; gap: 15px; align-items: center; flex-shrink: 0; }
        .header-buttons { display: flex; gap: 12px; }
        .header-greeting { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .header-greeting b { color: var(--text-color); }
        
        .btn-icon-header { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-icon-header:hover { color: white; background: rgba(255,255,255,0.1); transform: scale(1.05); }

        .container { max-width: 950px; margin: 30px auto; padding: 0 20px; }
        .page { display: none; animation: fadeInPage 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .page.active { display: block; }

        @keyframes fadeInPage { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- RELAX GLOW ANIMATION FÜR KARTEN --- */
        @keyframes relaxGlow {
            0% { box-shadow: 0 4px 15px rgba(0,0,0,0.2), 0 0 5px rgba(138, 43, 226, 0.05); }
            50% { box-shadow: 0 4px 15px rgba(0,0,0,0.2), 0 0 18px rgba(138, 43, 226, 0.25); }
            100% { box-shadow: 0 4px 15px rgba(0,0,0,0.2), 0 0 5px rgba(138, 43, 226, 0.05); }
        }

        /* --- HOMEPAGE NAVIGATION --- */
        .grid-navigation { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; margin-top: 10px; }
        .nav-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.03); border-radius: 16px; padding: 25px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
        .nav-card.card-watched:hover { border-color: var(--accent-green); box-shadow: 0 10px 20px rgba(46, 204, 113, 0.12); }
        .nav-card.card-current:hover { border-color: var(--accent-neon); box-shadow: 0 10px 20px rgba(0, 245, 212, 0.12); }
        .nav-card.card-next:hover { border-color: var(--accent-purple); box-shadow: 0 10px 20px rgba(138, 43, 226, 0.12); }
        .nav-card.card-watchlist:hover { border-color: var(--accent-blue); box-shadow: 0 10px 20px rgba(58, 134, 255, 0.12); }
        .nav-card:hover { transform: translateY(-6px); }
        .nav-card i { font-size: 2.3rem; margin-bottom: 12px; transition: transform 0.3s ease; }
        .nav-card.card-watched i { color: var(--accent-green); }
        .nav-card.card-current i { color: var(--accent-neon); }
        .nav-card.card-next i { color: var(--accent-purple); }
        .nav-card.card-watchlist i { color: var(--accent-blue); }
        .nav-card h3 { font-size: 1.05rem; font-weight: 600; }

        /* --- HOMEPAGE SECTIONS --- */
        .homepage-section { background: rgba(22, 25, 43, 0.7); border-radius: 16px; padding: 22px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .homepage-section.current-section { border-left: 4px solid var(--accent-neon); background: linear-gradient(90deg, rgba(0, 245, 212, 0.03) 0%, rgba(22, 25, 43, 0.7) 100%); }
        .homepage-section.alert-section { border-top: 3px solid var(--accent-orange); background: linear-gradient(180deg, rgba(255, 0, 85, 0.02) 0%, rgba(22, 25, 43, 0.7) 100%); }
        .homepage-section h2 { font-size: 1.25rem; margin-bottom: 18px; display: flex; align-items: center; gap: 12px; }

        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
        .anime-grid-item { background: var(--card-bg); border-radius: 14px; padding: 18px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(255, 0, 85, 0.15); box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s; cursor: pointer; animation: slideIn 0.4s ease forwards, relaxGlow 4s 0.4s infinite alternate ease-in-out; }
        .anime-grid-item:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(255, 0, 85, 0.15), 0 0 20px rgba(138, 43, 226, 0.4) !important; border-color: var(--accent-orange); z-index: 10; }
        .anime-grid-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .anime-grid-header h4 { font-size: 1.05rem; font-weight: 600; line-height: 1.4; flex: 1; }

        /* --- PAGES & BUTTONS --- */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: rgba(22, 25, 43, 0.4
